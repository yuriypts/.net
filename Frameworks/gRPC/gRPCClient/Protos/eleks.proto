// latest version of the protocol buffers language
syntax = "proto3"; 

// The package name is used to prevent name conflicts. It should be unique.
option csharp_namespace = "gRPCServer"; 

// The package name is used to prevent name conflicts. It should be unique.
//package greet;

// The greeting service definition.
service Eleks {
  // Sends a greeting
  rpc GetIfno (InfoRequest) returns (InfoResponse);
}

// public InfoResponse GetIfno(InfoRequest request)
