syntax = "proto3";

option csharp_namespace = "gRPCServer";

service Person
{
	rpc GetPersonInfo (PersonRequestModel) returns (PersonResponseModel);
	rpc GetStreamPersons (NewPersonRequestModel) returns (stream PersonResponseModel);
	rpc GetListPersons (NewPersonRequestModel) returns (PersonListResponseModel);
}

// common availabel types are - bool, int32, float, double, string, bytes, enum, message, repeated, map, fixed32, fixed64, sfixed32, sfixed64, sint32, sint64
message PersonRequestModel
{
	int32 userId = 1;
	// PersonResponseModel repeats = 2;
}

message PersonListResponseModel
{
	repeated PersonResponseModel persons = 1;
}

message PersonResponseModel
{
	string firstName = 1;
	string lastName = 2;
	string email = 3;
	int32 age = 4;
}

message  NewPersonRequestModel
{

}


// Stream - Use this if the array is very large or you want to process items as they arrive. The server sends multiple independent messages instead of one giant message
// Repeated - This is the standard way to return a list or array as a single response object. You define a message that contains a repeated field of the desired type.